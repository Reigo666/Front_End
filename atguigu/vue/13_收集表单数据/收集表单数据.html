<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="../vue.js"></script>
<body>
  <div id="root">
    <form @submit.prevent="demo">
      账号：<input type="text" v-model="username"><br/>
      密码：<input type="password" v-model="password"><br/>
      性别：
      男<input type="radio" name="sex" v-model="sex" value="male">
      女<input type="radio" name="sex" v-model="sex" value="female"><br/>
      爱好：
      学习<input type="checkbox" v-model="hobbies" value="study"> 打游戏<input type="checkbox" v-model="hobbies" value="play"> 吃饭<input type="checkbox" v-model="hobbies" value="eat"><br/>
      
      所属校区：<select v-model="school">
        <option value="" >请选择校区</option>
        <option value="beijing" >北京</option>
        <option value="shanghai" >上海</option>
        <option value="shenzhen" >深圳</option>
        <option value="wuhan" >武汉</option>
      </select><br/>
      其他信息：<textarea v-model="ohterInfo"></textarea><br>
      <input type="checkbox" v-model="agree">阅读并接受<a href="www.baidu.com">《用户协议》</a>
      <button>提交</button>
    </form>
    
  </div>
  <script>
    const vm=new Vue({
      el:'#root',
      data:{
        username:'',
        password:'',
        sex:'male',
        hobbies:[],
        school:'',
        ohterInfo:'',
        agree:''
      },
      methods:{
        demo(){
          console.log(JSON.parse(JSON.stringify(this._data)));
        }
      }
    })
  </script>
</body>
</html>
