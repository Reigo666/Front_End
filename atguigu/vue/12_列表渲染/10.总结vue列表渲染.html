<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="../vue.js"></script>
</head>
<body>
  <div id="root">
    <h1>学生信息</h1>

    <button v-on:click="student.age++">年龄+1岁</button><br>
    <button @click="addSex">添加性别属性，默认值：男</button><br>

    <button @click="student.sex='未知'">修改性别</button><br>
    <button @click="addFriend">在列表首位添加一个朋友</button><br>
    <button @click="updateName">修改第一个朋友的名字为：张三</button><br>
    <button @click="addHobby">添加一个爱好</button><br>
    <button @click="updateFirstHobby">修改第一个爱好为：开车</button><br>

    <h3>姓名：{{student.name}}</h3>
    <h3>年龄：{{student.age}}</h3>
    <h3 v-if="student.sex">性别：{{student.sex}}</h3>
    <h3>爱好：</h3>
    <ul>
      <li v-for="(v,k) in student.hobby" :key="k" >{{v}}</li>
    </ul>

    <h3>朋友：</h3>
    <ul>
      <li v-for="(v,k) in student.friends" :key="k">
        {{v.name}}--{{v.age}}
      </li>
    </ul>
  </div>
  <script>
    Vue.config.productionTip = false;
    const vm=new Vue({
      el:'#root',
      data:{
        student:{
          name:'李四',
          age:'23',
          hobby:['抽烟','喝酒','烫头'],
          friends:[
            {name:'王五',age:20},
            {name:'赵六',age:29}
          ]
        }
      },
      methods: {
        addSex(){
          Vue.set(this.student,'sex','男')
          // this.$set(this.student,'sex','男')
        },
        addFriend(){
          this.student.friends.unshift({name:'Reigo',age:23})
        },
        updateName(){
          this.student.friends[0].name='张三'
        },
        addHobby(){
          this.student.hobby.push('打豆豆')
        },
        updateFirstHobby(){
          this.student.hobby.splice(0,1,'开冲')
        }
      },
    })
  </script>
</body>
</html>
